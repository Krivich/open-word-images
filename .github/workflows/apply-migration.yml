name: Apply Manifest Migration
on:
  push:
    paths:
      - 'manifest-migration.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Validate migration file
        run: |
          python3 -c "
          import json
          with open('manifest-migration.json') as f:
              m = json.load(f)
          if 'concepts' not in m:
              print('ERROR: migration missing concepts')
              exit(1)
          print(f'Migration contains {len(m.concepts)} concept changes')
          "

      - name: Dry run (validate)
        run: python3 scripts/apply_migration.py --dry-run --verbose

      - name: Apply migration
        run: python3 scripts/apply_migration.py --skip-hash-check --verbose

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "chore: apply manifest migration [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}