name: Apply Manifest Migration
on:
  push:
    paths:
      - 'manifest-migration.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Validate migration file
        run: |
          python3 -c "
          import json
          with open('manifest-migration.json') as f:
              m = json.load(f)
          if 'concepts' not in m:
              print('ERROR: migration missing concepts key')
              exit(1)
          if not isinstance(m['concepts'], dict):
              print('ERROR: concepts must be a dict')
              exit(1)
          print(f\"Migration contains {len(m['concepts'])} concept changes\")
          "

      - name: Dry run (validate)
        run: python3 scripts/apply_migration.py --dry-run --verbose

      - name: Apply migration
        run: python3 scripts/apply_migration.py --skip-hash-check --verbose

      - name: Commit & Push with Optimistic Retry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Динамическое определение ветки
          BRANCH_NAME="${{ github.ref_name }}"
          REMOTE_REF="origin/${BRANCH_NAME}"

          MAX_RETRIES=3
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            # Добавляем изменения
            git add styles/ manifest.json

            # Проверяем, есть ли что коммитить
            if ! git diff --cached --quiet; then
              git commit -m "chore: auto-update [skip ci]"
            fi

            # Пытаемся запушить
            if git push origin HEAD:${BRANCH_NAME}; then
              echo "✅ Push successful to ${BRANCH_NAME}"
              exit 0
            fi

            # Если не вышло — пробуем ребейз и повтор
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "⚠️ Push failed (attempt $RETRY_COUNT/$MAX_RETRIES). Rebasing..."

            git fetch origin "${BRANCH_NAME}"
            git rebase "${REMOTE_REF}"

            # Если после ребейза нет изменений для коммита — выходим успешно
            if git diff --cached --quiet && git diff HEAD --quiet; then
              echo "✅ No changes to push after rebase"
              exit 0
            fi
          done

          echo "❌ Failed to push after $MAX_RETRIES attempts"
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}