name: Update Manifest

on:
  push:
    paths:
      - 'styles/**/*.png'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 scripts/gen_manifest.py
      - run: python3 scripts/create_symlinks.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update manifest and symlinks [skip ci]"
