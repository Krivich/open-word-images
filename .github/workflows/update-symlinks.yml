name: Sync Symlinks from Manifest
on:
  push:
    paths:
      - 'manifest.json'
      - '.github/workflows/update-symlinks.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-symlinks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Generate & Sync Symlinks
        run: |
          python3 - << 'PYEOF'
          import json, shutil
          from pathlib import Path

          manifest = json.loads(Path("manifest.json").read_text())
          styles_root = Path("styles")
          SIZES = ["128", "256", "512"]

          for style_dir in styles_root.iterdir():
              if not style_dir.is_dir() or style_dir.name.startswith("."): continue

              # 1. Чистим старые корневые симлинки (_latest, _best)
              for ln in list(style_dir.glob("*_latest.png")) + list(style_dir.glob("*_best.png")):
                  ln.unlink(missing_ok=True)

              # 2. Полностью пересоздаём latest/ и best/ (гарантирует отсутствие мусора)
              for folder in ("latest", "best"):
                  target_dir = style_dir / folder
                  if target_dir.exists():
                      shutil.rmtree(target_dir)
                  target_dir.mkdir(exist_ok=True)

          # 3. Строим симлинки по манифесту
          for word, concept in manifest.get("concepts", {}).items():
              for style_name, style_data in concept.get("styles", {}).items():
                  style_dir = styles_root / style_name
                  if not style_dir.exists(): continue

                  latest_v = style_data.get("latest")
                  best_v   = style_data.get("best")

                  def build_links(folder_name: str, version: int | None):
                      if version is None: return
                      src_name = f"{word}_v{version}.png"
                      src_path = style_dir / src_name
                      if not src_path.exists():
                          print(f"  ⚠️ Source missing: {src_path}")
                          return

                      base = style_dir / folder_name
          
                      # Корневой симлинк: latest/cat.png -> ../cat_v3.png
                      link_root = base / f"{word}.png"
                      link_root.symlink_to(f"../{src_name}")

                      # Превью: latest/thumbs/128/cat.png -> ../../../thumbs/128/cat_v3.png
                      for s in SIZES:
                          s_dir = base / "thumbs" / s
                          s_dir.mkdir(parents=True, exist_ok=True)
                          link_thumb = s_dir / f"{word}.png"
                          # Поднимаемся на 3 уровня вверх до корня стиля, затем в thumbs/{size}
                          link_thumb.symlink_to(f"../../../thumbs/{s}/{src_name}")
                          print(f"  🔗 {link_thumb.relative_to(styles_root)} -> {src_name}")

                  build_links("latest", latest_v)
                  build_links("best", best_v)

          print("✅ Symlinks structure synced.")
          PYEOF

      - name: Commit & Push with Optimistic Retry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Динамическое определение ветки
          BRANCH_NAME="${{ github.ref_name }}"
          REMOTE_REF="origin/${BRANCH_NAME}"

          MAX_RETRIES=3
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            # Добавляем изменения
            git add styles/ manifest.json

            # Проверяем, есть ли что коммитить
            if ! git diff --cached --quiet; then
              git commit -m "chore: auto-update [skip ci]"
            fi

            # Пытаемся запушить
            if git push origin HEAD:${BRANCH_NAME}; then
              echo "✅ Push successful to ${BRANCH_NAME}"
              exit 0
            fi

            # Если не вышло — пробуем ребейз и повтор
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "⚠️ Push failed (attempt $RETRY_COUNT/$MAX_RETRIES). Rebasing..."

            git fetch origin "${BRANCH_NAME}"
            git rebase "${REMOTE_REF}"

            # Если после ребейза нет изменений для коммита — выходим успешно
            if git diff --cached --quiet && git diff HEAD --quiet; then
              echo "✅ No changes to push after rebase"
              exit 0
            fi
          done

          echo "❌ Failed to push after $MAX_RETRIES attempts"
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}