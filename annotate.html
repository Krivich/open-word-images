<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Annotator — Выбор лучшей версии</title>
  <style>
:root {
  --bg: #f5f5f5;
  --card: #fff;
  --selected: #2563eb;
  --selected-bg: #dbeafe;
  --focus-ring: #f59e0b;
  --focus-bg: #fef3c7;
  --text: #1f2937;
  --gray: #6b7280;
  --border: #e5e7eb;
  --hover: #f3f4f6;
  --row-height: 175px;
  --max-width: 1400px;
}

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.4;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      background: var(--card);
      border-bottom: 2px solid var(--border);
      padding: 10px 16px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    header h1 { font-size: 16px; margin-right: auto; }
    .stats { font-size: 12px; color: var(--gray); }
    .stats span { font-weight: 600; color: var(--selected); }

    .btn {
      padding: 5px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.15s;
    }
    .btn-primary { background: var(--selected); color: #fff; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary { background: var(--border); color: var(--text); }
    .btn-secondary:hover { background: #d1d5db; }

    /* Kbd hints */
    .kbd-hints {
      font-size: 11px;
      color: var(--gray);
      padding: 4px 16px 6px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    kbd {
      background: #e5e7eb;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 11px;
      border: 1px solid #d1d5db;
    }

/* Table header - removed */

    /* Virtual scroll */
    .scroll-viewport {
      flex: 1;
      overflow-y: auto;
      position: relative;
      scroll-behavior: auto;
    }
    .scroll-spacer { position: relative; }
    .scroll-content {
      position: absolute;
      top: 0; left: 0; right: 0;
    }

/* Row */
.row {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 8px 16px;
  height: var(--row-height);
  background: var(--card);
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.row:hover { background: var(--hover); }
.row.focused { background: var(--focus-bg); outline: 2px solid var(--focus-ring); outline-offset: -2px; }
.row.selected { background: var(--selected-bg); }
.row.focused.selected { background: #bfdbfe; }

/* Meta row 1 - word list + min_age + concept */
.row .meta-row-1 {
  display: grid;
  grid-template-columns: 300px 60px 1fr;
  gap: 8px;
  align-items: center;
}

/* Meta row 2 - prompt */
.row .meta-row-2 {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
  font-size: 10px;
  color: var(--gray);
  min-height: 14px;
}

/* Versions row - third line */
.row .versions-row {
  display: grid;
  grid-template-columns: repeat(var(--max-versions, 5), 110px);
  gap: 16px;
  justify-content: start;
  align-items: start;
}

.col-min-age {
  font-weight: 600;
  font-size: 12px;
  color: var(--text);
  white-space: nowrap;
}

    .col-word {
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .col-concept {
      font-size: 12px;
      color: var(--gray);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Version cell */
.version-cell {
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  padding: 2px;
  border-radius: 8px;
  border: 3px solid transparent;
  transition: all 0.1s;
  position: relative;
}
.version-cell:hover { border-color: var(--selected); }
.version-cell.selected {
  border-color: var(--selected);
  background: var(--selected-bg);
}
.version-cell.focused {
  border-color: var(--focus-ring);
  background: var(--focus-bg);
  box-shadow: 0 0 0 3px var(--focus-ring);
}
    .version-cell.empty { cursor: default; opacity: 0.3; }
.version-cell img {
  width: 94px;
  height: 94px;
  object-fit: contain;
  border-radius: 4px;
  background: #fff;
  border: 1px solid var(--border);
}
.version-cell .check-mark {
      position: absolute;
      top: 1px; right: 1px;
      width: 16px; height: 16px;
      background: var(--selected);
      color: #fff;
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: bold;
    }
    .version-cell.selected .check-mark { display: flex; }

    /* Progress bar */
    .progress-bar {
      position: absolute; right: 0; top: 0; bottom: 0;
      width: 4px; background: var(--border); z-index: 50;
    }
    .progress-fill {
      position: absolute; top: 0; left: 0; width: 100%;
      background: var(--selected);
      transition: height 0.1s;
    }

    /* Loading */
    .loading {
      text-align: center; padding: 40px; color: var(--gray);
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    }
    .loading .spinner {
      display: inline-block; width: 24px; height: 24px;
      border: 3px solid var(--border); border-top-color: var(--selected);
      border-radius: 50%; animation: spin 0.8s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff; padding: 8px 16px; border-radius: 8px;
      font-size: 13px; z-index: 200; opacity: 0; transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }

/* Modal */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); display: none; z-index: 300;
  justify-content: center; align-items: center;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--card); border-radius: 12px; padding: 24px;
  max-width: 700px; width: 90%; max-height: 80vh; overflow-y: auto;
}
.modal h3 { margin-bottom: 16px; }
.modal pre {
  background: #f3f4f6; padding: 12px; border-radius: 8px;
  font-size: 12px; overflow-x: auto; white-space: pre-wrap;
  word-break: break-all; max-height: 400px;
}
.modal-actions { display: flex; gap: 8px; margin-top: 16px; }

/* Image Preview Overlay */
.preview-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85); display: none; z-index: 400;
  justify-content: center; align-items: center; cursor: pointer;
}
.preview-overlay.active { display: flex; }
.preview-overlay img {
  max-width: 90vw; max-height: 90vh;
  object-fit: contain; border-radius: 8px;
  box-shadow: 0 0 40px rgba(0,0,0,0.5);
}
.preview-overlay .preview-hint {
  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.7); color: #fff; padding: 8px 16px;
  border-radius: 6px; font-size: 12px; pointer-events: none;
}
    
    /* Migration Stats */
    .migration-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 16px;
    }
    .stat-item {
      text-align: center;
      padding: 12px;
      background: #f3f4f6;
      border-radius: 6px;
      border: 1px solid #e5e7eb;
    }
    .stat-label {
      display: block;
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 4px;
    }
    .stat-value {
      display: block;
      font-size: 18px;
      font-weight: 600;
      color: #2563eb;
    }
  </style>
</head>
<body>
  <header>
    <h1>📋 Annotator</h1>
    <div class="stats">
      Выбрано: <span id="selected-count">0</span> / <span id="total-words">0</span>
    </div>
    <button class="btn btn-secondary" onclick="selectAll()">Все latest</button>
    <button class="btn btn-secondary" onclick="clearAll()">Сбросить</button>
    <button class="btn btn-secondary" onclick="toggleFilter('pending')" id="btn-filter-pending">Только без best</button>
    
    <button class="btn btn-primary" onclick="showMigration()">📤 Export Migration</button>
  </header>

  <div class="kbd-hints">
    <kbd>↑</kbd> <kbd>↓</kbd> строки &nbsp;|&nbsp;
    <kbd>←</kbd> <kbd>→</kbd> версии &nbsp;|&nbsp;
    <kbd>Space</kbd> выбрать/снять &nbsp;|&nbsp;
    <kbd>R</kbd> сбросить на latest &nbsp;|&nbsp;
    <kbd>Home</kbd> <kbd>End</kbd>
  </div>

<!-- Table header removed -->

  <div class="loading" id="loading">
    <span class="spinner"></span> Загрузка...
  </div>

  <div class="scroll-viewport" id="viewport" style="display:none;">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="scroll-spacer" id="spacer">
      <div class="scroll-content" id="content"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<div class="modal-overlay" id="migration-modal" onclick="closeModal(event)">
  <div class="modal">
    <h3>📤 Экспорт миграции</h3>
    <div class="migration-stats">
      <div class="stat-item">
        <span class="stat-label">Всего концептов:</span>
        <span class="stat-value" id="migration-total">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Выбрано версий:</span>
        <span class="stat-value" id="migration-selected">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Без изменений:</span>
        <span class="stat-value" id="migration-unchanged">0</span>
      </div>
    </div>
    <pre id="migration-data"></pre>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="copyMigration()">📋 Копировать</button>
      <button class="btn btn-primary" onclick="downloadMigration()">💾 Скачать JSON</button>
      <button class="btn btn-secondary" onclick="closeModal()">Закрыть</button>
    </div>
  </div>
</div>

<!-- Image Preview Overlay -->
<div class="preview-overlay" id="preview-overlay" onclick="closePreview()" onmouseleave="closePreview()">
  <img id="preview-image" src="" alt="Preview">
  <div class="preview-hint">Click, press ESC, or move mouse away to close</div>
</div>

  <script>
    // Base path for GitHub Pages (same as index.html)
    const REPO_BASE = (() => {
      const path = window.location.pathname;
      const parts = path.split('/').filter(p => p);
      // If the first segment is an HTML file (e.g., annotate.html), treat repo base as root
      if (parts.length > 0 && parts[0].endsWith('.html')) {
        return '';
      }
      return parts.length > 0 ? `/${parts[0]}/` : '';
    })();
    // === STATE ===
    // Концепты, а не отдельные слова
    window.conceptsData = [];          // массив {concept, words: [], versions: [], bestVersion, latestVersion}
    let selected = {};              // {concept: version}
    let latestMap = {};             // {concept: 'latest' version} — из manifest
    let maxVersions = 5;
    const ROW_HEIGHT = 175;
    const BUFFER = 5;

    // Focus state
    let focusedRow = 0;
    let focusedCol = 0;  // index within versions array

    // Filter state
    let filterMode = 'all';  // 'all' | 'pending' (только без best)

// Virtual scroll
let viewport, spacer, content;
let renderStart = 0, renderEnd = 0;

// Preview state
let longTapTimeout = null;
let touchStartTarget = null;
let currentPreviewSrc = null;
let pointerDownTime = 0;

    // === IMAGE PREVIEW ===
function showPreview(imgSrc) {
  const overlay = document.getElementById('preview-overlay');
  const img = document.getElementById('preview-image');
  img.src = imgSrc;
  currentPreviewSrc = imgSrc;
  overlay.classList.add('active');
}

function closePreview() {
  const overlay = document.getElementById('preview-overlay');
  overlay.classList.remove('active');
  currentPreviewSrc = null;
}

// === INIT ===
    async function init() {
      try {
        const rawManifest = await fetch('manifest.json?t=' + Date.now()).then(r => r.json());
        window.rawManifestGlobal = rawManifest;
        console.log('✅ Manifest loaded:', Object.keys(window.rawManifestGlobal.concepts || {}).length, 'concepts');

        // --------------------------------------------------------------
        // 1️⃣  Build map word → concept (из раздела `words`)
        // --------------------------------------------------------------
        const wordToConcept = {};
        if (window.rawManifestGlobal && window.rawManifestGlobal.words) {
          for (const [w, info] of Object.entries(window.rawManifestGlobal.words)) {
            wordToConcept[w] = info.concept;
          }
        }

        // --------------------------------------------------------------
        // 2️⃣  Build map concept → {words: [], versions: []}
        // --------------------------------------------------------------
        const conceptsMap = {};   // conceptKey → {concept, words: [], versions: [], bestVersion, latestVersion}

// Helper: ensure entry exists
const ensureConcept = (c) => {
  if (!conceptsMap[c]) {
    conceptsMap[c] = { concept: c, words: [], versions: [], bestVersion: null, latestVersion: null, minAge: null };
  }
  return conceptsMap[c];
};

        // Populate words list for each concept
        for (const [word, conceptKey] of Object.entries(wordToConcept)) {
          const entry = ensureConcept(conceptKey);
          entry.words.push(word);
        }

// Walk through concepts → styles → versions
for (const [conceptKey, conceptObj] of Object.entries(window.rawManifestGlobal?.concepts || {})) {
  const defaultStyle = conceptObj.default_style || 'default';
  const styleObj = conceptObj.styles && conceptObj.styles[defaultStyle];
  if (!styleObj || !styleObj.versions) continue;

  const conceptEntry = ensureConcept(conceptKey);
  conceptEntry.minAge = conceptObj.min_age || null;
  const bestVer = styleObj.best ? `v${styleObj.best}` : null;

          for (const v of styleObj.versions) {
            const versionLabel = v.n === styleObj.latest ? 'latest' : `v${v.n}`;
            const isLatest = v.n === styleObj.latest;
            const isBest = bestVer && versionLabel === bestVer;
            const previews = v.previews ? {
              '128': REPO_BASE + 'styles/' + v.previews['128'],
              '256': REPO_BASE + 'styles/' + v.previews['256'],
              '512': REPO_BASE + 'styles/' + v.previews['512']
            } : null;

conceptEntry.versions.push({
  version: versionLabel,
  originalVersion: `v${v.n}`,
  isLatest,
  isBest,
  path: REPO_BASE + 'styles/' + v.path,
  url: previews ? previews['256'] : REPO_BASE + 'styles/' + v.path,
  url512: previews ? previews['512'] : (previews ? previews['256'] : REPO_BASE + 'styles/' + v.path),
  prompt: v.prompt || ''
});

            if (isLatest) conceptEntry.latestVersion = versionLabel;
            if (isBest)   conceptEntry.bestVersion   = versionLabel;
          }
        }

// Convert map → sorted array (Russian concepts first, then English)
window.conceptsData = Object.values(conceptsMap).sort((a, b) => {
  const aIsRu = /^[а-яё]/i.test(a.concept);
  const bIsRu = /^[а-яё]/i.test(b.concept);
  if (aIsRu && !bIsRu) return -1;
  if (!aIsRu && bIsRu) return 1;
  return (a.concept || '').localeCompare(b.concept || '');
});

        // Sort versions inside each concept numerically and extract prompts
        window.conceptsData.forEach(c => {
          c.versions.sort((a, b) => {
            const na = parseInt(a.originalVersion.replace('v','')) || 0;
            const nb = parseInt(b.originalVersion.replace('v','')) || 0;
            return na - nb;
          });
        });

        // --------------------------------------------------------------
        // 3️⃣  Load human‑readable names (words.py) – optional
        // --------------------------------------------------------------
        let humanNames = {};
        try {
          // Try to load words.py if it exists (optional file for human-readable names)
          const wordsResponse = await fetch('words.py?t=' + Date.now());
          if (wordsResponse.ok) {
            const txt = await wordsResponse.text();
            const re = /"(\w+)":\s*"([^\"]+)"/g;
            let m;
            while ((m = re.exec(txt)) !== null) humanNames[m[1]] = m[2];
          }
        } catch(e) {
          // words.py not available or failed - this is OK, it's optional
          console.log('ℹ️ words.py not available (optional file)');
        }
        window.conceptsData.forEach(c => {
          c.humanName = humanNames[c.concept] || '';
        });

        console.log('✅ Data processed:', window.conceptsData.length, 'concepts with prompts');

        // Initialize concept order for migration
        initConceptOrder();

        // --------------------------------------------------------------
        // 4️⃣  UI‑подготовка
        // --------------------------------------------------------------
        maxVersions = Math.min(5, Math.max(...window.conceptsData.map(c => c.versions.length), 1));
        document.documentElement.style.setProperty('--max-versions', maxVersions);

// Table header removed - no version columns to build anymore

        // Restore previous selection (по концептам)
        try { selected = JSON.parse(localStorage.getItem('annotator_selection') || '{}'); } catch(e) {}

        // Setup virtual scroll
        viewport = document.getElementById('viewport');
        spacer = document.getElementById('spacer');
        content = document.getElementById('content');
        spacer.style.height = (window.conceptsData.length * ROW_HEIGHT) + 'px';

        document.getElementById('loading').style.display = 'none';
        viewport.style.display = 'block';
        document.getElementById('total-words').textContent = window.conceptsData.length;
        console.log('✅ UI initialized:', window.conceptsData.length, 'concepts loaded');
        viewport.addEventListener('scroll', onScroll, { passive: true });

        // Initial focus
        if (getVisibleConcepts().length > 0) {
          focusedRow = 0;
          focusedCol = getPreferredCol(0);
        }

        renderVisibleRows(true);
        updateStats();
        updateProgress();
        scrollToFocused();
      } catch(e) {
        console.error('❌ Error in init():', e);
        document.getElementById('loading').innerHTML = `❌ ${e.message}`;
      }
    }

    function getPreferredCol(rowIdx) {
      const visible = getVisibleConcepts();
      const c = visible[rowIdx];
      if (!c || !c.versions.length) return 0;
      // Если уже выбрана версия для концепта – вернуть её индекс
      if (selected[c.concept]) {
        const idx = c.versions.findIndex(v => v.version === selected[c.concept]);
        if (idx >= 0) return idx;
      }
      // Иначе – последняя (самая новая) версия
      return c.versions.length - 1;
    }

    function getVisibleConcepts() {
      if (filterMode === 'all') return window.conceptsData;
      return window.conceptsData.filter(c => !c.bestVersion);
    }

    function toggleFilter(mode) {
      filterMode = mode;
      document.getElementById('btn-filter-pending').classList.toggle('btn-primary', filterMode === 'pending');
      document.getElementById('btn-filter-pending').classList.toggle('btn-secondary', filterMode !== 'pending');
      const visible = getVisibleConcepts();
      spacer.style.height = (visible.length * ROW_HEIGHT) + 'px';
      focusedRow = 0;
      focusedCol = getPreferredCol(0);
      updateStats();
      renderVisibleRows(true);
    }

    // === VIRTUAL SCROLL ===
    function onScroll() {
      renderVisibleRows(false);
      updateProgress();
    }

    function renderVisibleRows(force) {
      if (!viewport) return;
      const visible = getVisibleConcepts();
      const scrollTop = viewport.scrollTop;
      const viewH = viewport.clientHeight;

      const start = Math.max(0, Math.floor(scrollTop / ROW_HEIGHT) - BUFFER);
      const end = Math.min(visible.length - 1, Math.ceil((scrollTop + viewH) / ROW_HEIGHT) + BUFFER);

      // Re-render if range changed OR forced (e.g. focus change)
      if (!force && start === renderStart && end === renderEnd) return;
      renderStart = start;
      renderEnd = end;

      content.style.transform = `translateY(${start * ROW_HEIGHT}px)`;

let html = '';
for (let i = start; i <= end; i++) {
  const c = visible[i];
  const isSel = !!selected[c.concept];
  const isFocused = i === focusedRow;
  const rowClass = (isFocused ? 'focused ' : '') + (isSel ? 'selected' : '');

  // Список всех слов, связанных с концептом (Russian first)
  const sortedWords = [...c.words].sort((a, b) => {
    const aIsRu = /^[а-яё]/i.test(a);
    const bIsRu = /^[а-яё]/i.test(b);
    if (aIsRu && !bIsRu) return -1;
    if (!aIsRu && bIsRu) return 1;
    return a.localeCompare(b);
  });
  const wordsList = sortedWords.join(', ');
  html += `<div class="row ${rowClass}" data-row="${i}">`;
  
  // Row 1: word list (3x wider) + min_age+ + concept
  html += `<div class="meta-row-1">`;
  html += `<div class="col-word" title="${esc(wordsList)}">${esc(wordsList)}</div>`;
  html += `<div class="col-min-age">${c.minAge !== null ? c.minAge + '+' : '—'}</div>`;
  html += `<div class="col-concept" title="${esc(c.humanName)}">${esc(c.humanName) || '—'}</div>`;
  html += `</div>`;

  // Row 2: prompt (from first version or selected version)
  html += `<div class="meta-row-2">`;
  const firstVer = c.versions[0];
  const promptText = firstVer && firstVer.prompt ? firstVer.prompt.substring(0, 80) + (firstVer.prompt.length > 80 ? '...' : '') : '';
  html += `<div title="${esc(firstVer && firstVer.prompt || '')}">${esc(promptText)}</div>`;
  html += `</div>`;

  // Row 3: version cells
  html += `<div class="versions-row">`;
  for (let j = 0; j < maxVersions; j++) {
    const ver = c.versions[j];
    if (ver) {
      const isSelVer = selected[c.concept] === ver.version;
      const isFocusedCell = isFocused && j === focusedCol;
      const cellClass = (isSelVer ? 'selected ' : '') + (isFocusedCell ? 'focused' : '');
      html += `<div class="version-cell ${cellClass}${ver.isBest ? ' best' : ''}" data-row="${i}" data-col="${j}" data-prv="${ver.url512}"
        onclick="if(Date.now()-pointerDownTime<400) clickVersion(${i},${j})"
        onpointerdown="pointerDownTime=Date.now(); longTapTimeout=setTimeout(()=>{showPreview('${ver.url512}'); pointerDownTime=0},500)"
        onpointerup="clearTimeout(longTapTimeout)"
        onpointerleave="clearTimeout(longTapTimeout)">
        <span class="check-mark">✓</span>
        <img src="${ver.url}" loading="lazy" onerror="this.style.display='none'">
      </div>`;
    } else {
      html += `<div class="version-cell empty"><span class="ver-label">—</span></div>`;
    }
  }
  html += `</div>`;
  html += `</div>`;
}

      content.innerHTML = html;
    }

    function esc(s) {
      return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function updateProgress() {
      if (!viewport) return;
      const max = spacer.offsetHeight - viewport.clientHeight;
      const pct = max > 0 ? viewport.scrollTop / max : 0;
      document.getElementById('progress-fill').style.height = (Math.min(1, Math.max(0, pct)) * 100) + '%';
    }

    // === FOCUS & NAV ===
    function scrollToFocused() {
      if (!viewport) return;
      const rowTop = focusedRow * ROW_HEIGHT;
      const rowBottom = rowTop + ROW_HEIGHT;
      const viewTop = viewport.scrollTop;
      const viewBottom = viewTop + viewport.clientHeight;

      if (rowTop < viewTop + 40) {
        viewport.scrollTop = Math.max(0, rowTop - 40);
      } else if (rowBottom > viewBottom - 40) {
        viewport.scrollTop = Math.min(spacer.offsetHeight - viewport.clientHeight, rowBottom - viewport.clientHeight + 40);
      }
    }

    function moveRow(delta) {
      const visible = getVisibleConcepts();
      const newRow = Math.max(0, Math.min(visible.length - 1, focusedRow + delta));
      if (newRow !== focusedRow) {
        focusedRow = newRow;
        focusedCol = getPreferredCol(newRow);
        renderVisibleRows(true);
        scrollToFocused();
      }
    }

    function moveCol(delta) {
      const c = window.conceptsData[focusedRow];
      if (!c) return;
      const newCol = Math.max(0, Math.min(c.versions.length - 1, focusedCol + delta));
      if (newCol !== focusedCol) {
        focusedCol = newCol;
        renderVisibleRows(true);
      }
    }

    function toggleCurrent() {
      const visible = getVisibleConcepts();
      const c = visible[focusedRow];
      if (!c || !c.versions[focusedCol]) return;
      const ver = c.versions[focusedCol].version;

      if (selected[c.concept] === ver) {
        // Снимаем — возвращаем к latest (если есть) или убираем выбор
        if (c.latestVersion) {
          selected[c.concept] = c.latestVersion;
        } else {
          delete selected[c.concept];
        }
      } else {
        selected[c.concept] = ver;
      }
      saveSelection();
      renderVisibleRows(true);
      updateStats();
    }

    function resetToLatest() {
      const visible = getVisibleConcepts();
      const c = visible[focusedRow];
      if (!c) return;
      if (c.latestVersion) {
        selected[c.concept] = c.latestVersion;
        // Переместить фокус на колонку latest
        const idx = c.versions.findIndex(v => v.version === c.latestVersion);
        if (idx >= 0) focusedCol = idx;
      } else if (c.versions.length) {
        delete selected[c.concept];
      }
      saveSelection();
      renderVisibleRows(true);
      updateStats();
    }

    function clickVersion(row, col) {
      focusedRow = row;
      focusedCol = col;
      renderVisibleRows(true);
      scrollToFocused();
    }

    function selectAll() {
      window.conceptsData.forEach(c => {
        if (c.latestVersion) {
          selected[c.concept] = c.latestVersion;
        } else if (c.versions.length) {
          selected[c.concept] = c.versions[c.versions.length - 1].version;
        }
      });
      saveSelection();
      renderVisibleRows(true);
      updateStats();
      showToast('✅ Выбраны все latest');
    }

    function clearAll() {
      selected = {};
      saveSelection();
      renderVisibleRows(true);
      updateStats();
      showToast('🗑️ Сброс');
    }

    function saveSelection() {
      try { localStorage.setItem('annotator_selection', JSON.stringify(selected)); } catch(e) {}
    }

    function updateStats() {
      const visible = getVisibleConcepts();
      const total = visible.length;
      const pending = visible.filter(c => !c.bestVersion).length;
      document.getElementById('selected-count').textContent = Object.keys(selected).length;
      document.getElementById('total-words').textContent = filterMode === 'pending' ? `${pending}/${window.conceptsData.length}` : total;
    }

// === KEYBOARD ===
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  if (e.key === 'ArrowDown') {
        e.preventDefault();
        moveRow(1);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        moveRow(-1);
      } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        moveCol(1);
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        moveCol(-1);
      } else if (e.key === ' ') {
        e.preventDefault();
        toggleCurrent();
      } else if (e.key === 'r' || e.key === 'к') {
        e.preventDefault();
        resetToLatest();
      } else if (e.key === 'Home') {
        e.preventDefault();
        focusedRow = 0;
        focusedCol = getPreferredCol(0);
        renderVisibleRows(true);
        scrollToFocused();
      } else if (e.key === 'End') {
        e.preventDefault();
        focusedRow = window.conceptsData.length - 1;
        focusedCol = getPreferredCol(focusedRow);
        renderVisibleRows(true);
        scrollToFocused();
} else if (e.key === 'a' && (e.ctrlKey || e.metaKey)) {
  e.preventDefault();
  selectAll();
} else if (e.key === 'Escape') {
  closePreview();
} else if (e.key === 'Control') {
  const overlay = document.getElementById('preview-overlay');
  if (overlay.classList.contains('active')) {
    closePreview();
  } else {
    // Show preview of currently focused version
    const visible = getVisibleConcepts();
    const c = visible[focusedRow];
    if (c && c.versions[focusedCol] && c.versions[focusedCol].url512) {
      showPreview(c.versions[focusedCol].url512);
    }
  }
}
    });

    function closeModal(e) {
      if (e && e.target !== e.currentTarget) return;
      document.getElementById('migration-modal').classList.remove('active');
    }

    function showMigrationModal() {
      const data = buildMigration();
      const totalConcepts = manifestConceptOrder.length;
      const selectedConcepts = window.conceptsData.filter(c => selected[c.concept] !== undefined).length;
      const unchangedConcepts = totalConcepts - selectedConcepts;
      
      // Update stats
      document.getElementById('migration-total').textContent = totalConcepts;
      document.getElementById('migration-selected').textContent = selectedConcepts;
      document.getElementById('migration-unchanged').textContent = unchangedConcepts;
      
      // Update data
      document.getElementById('migration-data').textContent = JSON.stringify(data, null, 2);
      
      // Show modal
      document.getElementById('migration-modal').classList.add('active');
    }
    
    function copyMigration() {
      const data = document.getElementById('migration-data').textContent;
      navigator.clipboard.writeText(data).then(() => {
        showToast('📋 Миграция скопирована');
      });
    }
    
    function downloadMigration() {
      const data = document.getElementById('migration-data').textContent;
      const blob = new Blob([data], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'manifest-migration.json';
      a.click();
      URL.revokeObjectURL(a.href);
      showToast('📤 Миграция скачана');
    }

    // --- Migration Export ---
    // Preserve original manifest ordering by using placeholders for unchanged concepts
    let manifestConceptOrder = [];
    function initConceptOrder() {
      if (window.rawManifestGlobal && window.rawManifestGlobal.concepts) {
        manifestConceptOrder = Object.keys(window.rawManifestGlobal.concepts);
      }
    }
    function buildMigration() {
      const mig = { 
        _manifest_hash: computeManifestHash(),
        concepts: {}
      };
      
      // Apply selected versions ( структура 1 в 1 как манифест )
      // - v1, v2... -> best = ИНДЕКС версии в массиве (не номер!)
      // - latest -> best = индекс latest в массиве (осознанный выбор!)
      // - не выбрано / undefined -> не включаем (пропуск)
      window.conceptsData.forEach(c => {
        const sel = selected[c.concept];
        if (!sel) return;

        // Находим индекс выбранной версии в массиве versions
        const idx = c.versions.findIndex(v => v.version === sel);
        if (idx >= 0) {
          // best = индекс + 1 (1-based для человека)
          mig.concepts[c.concept] = { styles: { default: { best: idx + 1 } } };
        }
      });
      
      return mig;
    }
    
    function computeManifestHash() {
      // Simple hash based on manifest content and selected versions
      const manifestStr = JSON.stringify(window.rawManifestGlobal);
      const selectedStr = JSON.stringify(selected);
      const combined = manifestStr + selectedStr;
      
      // Simple hash function
      let hash = 0;
      for (let i = 0; i < combined.length; i++) {
        const char = combined.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash = hash & hash; // Convert to 32-bit integer
      }
      return Math.abs(hash).toString(16);
    }
    // Initialize order after manifest load (called from init())

    function showMigration() {
      showMigrationModal();
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    // === START ===
    init();
  </script>
